# =============================================================================
# HiClaw — values overlay for local kind cluster
# =============================================================================
# Usage:
#   helm install hiclaw helm/hiclaw/ \
#     -n hiclaw --create-namespace \
#     -f helm/hiclaw/values-kind.yaml \
#     --set credentials.registrationToken=<token> \
#     --set credentials.adminPassword=<password> \
#     --set credentials.llmApiKey=<api-key>
# =============================================================================

# kind uses local-path-provisioner by default; no StorageClass needed.
matrixServer:
  tuwunel:
    persistence:
      storageClassName: ""
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 250m
        memory: 256Mi

objectStorage:
  minio:
    persistence:
      storageClassName: ""
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 250m
        memory: 512Mi

# Reduced resource requests for local dev
controller:
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

manager:
  resources:
    requests:
      cpu: 250m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 4Gi

elementWeb:
  matrixServerUrl: "http://localhost:18080"
  service:
    type: ClusterIP
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 1Gi

# Higress: expose gateway via NodePort for kind port mapping
higress:
  global:
    local: true
  higress-core:
    gateway:
      replicas: 1
      httpPort: 80
      httpsPort: 443
      service:
        type: NodePort
        ports:
          - name: http2
            port: 80
            protocol: TCP
            targetPort: 80
            nodePort: 30080
          - name: https
            port: 443
            protocol: TCP
            targetPort: 443
            nodePort: 30443
