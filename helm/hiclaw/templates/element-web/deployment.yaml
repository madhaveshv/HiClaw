{{- if .Values.elementWeb.enabled }}
{{- $comp := dict "root" . "component" "element-web" }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "hiclaw.elementWeb.fullname" . }}
  namespace: {{ include "hiclaw.namespace" . }}
  labels:
    {{- include "hiclaw.component.labels" $comp | nindent 4 }}
spec:
  replicas: {{ .Values.elementWeb.replicaCount }}
  selector:
    matchLabels:
      {{- include "hiclaw.component.selectorLabels" $comp | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "hiclaw.component.selectorLabels" $comp | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: element-web
          image: "{{ .Values.elementWeb.image.repository }}:{{ .Values.elementWeb.image.tag }}"
          imagePullPolicy: {{ .Values.elementWeb.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
          env:
            {{- /*
            MATRIX_SERVER_URL is the URL browsers use to connect to the Matrix server.
            In K8s local mode with port-forward, the browser connects through the
            AI Gateway (Higress), which proxies to Tuwunel.
            For now, use the Tuwunel internal URL; users override via port-forward
            or Ingress in production.
            */}}
            - name: MATRIX_SERVER_URL
              value: {{ .Values.elementWeb.matrixServerUrl | default (include "hiclaw.tuwunel.internalURL" .) | quote }}
          resources:
            {{- toYaml .Values.elementWeb.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
{{- end }}
