apiVersion: v1
kind: Secret
metadata:
  name: {{ include "hiclaw.secretName" . }}
  namespace: {{ include "hiclaw.namespace" . }}
  labels:
    {{- include "hiclaw.commonLabels" . | nindent 4 }}
type: Opaque
stringData:
  HICLAW_REGISTRATION_TOKEN: {{ required "credentials.registrationToken is required" .Values.credentials.registrationToken | quote }}
  HICLAW_MATRIX_REGISTRATION_TOKEN: {{ .Values.credentials.registrationToken | quote }}
  HICLAW_ADMIN_USER: {{ .Values.credentials.adminUser | quote }}
  HICLAW_ADMIN_PASSWORD: {{ required "credentials.adminPassword is required" .Values.credentials.adminPassword | quote }}
  HICLAW_LLM_API_KEY: {{ required "credentials.llmApiKey is required" .Values.credentials.llmApiKey | quote }}
  HICLAW_LLM_PROVIDER: {{ .Values.credentials.llmProvider | quote }}
  HICLAW_DEFAULT_MODEL: {{ .Values.credentials.defaultModel | quote }}
  {{- if .Values.credentials.controllerApiKey }}
  HICLAW_CONTROLLER_API_KEY: {{ .Values.credentials.controllerApiKey | quote }}
  {{- end }}
  {{- if .Values.credentials.managerPassword }}
  HICLAW_MANAGER_PASSWORD: {{ .Values.credentials.managerPassword | quote }}
  {{- end }}
  {{- if .Values.credentials.managerGatewayKey }}
  HICLAW_MANAGER_GATEWAY_KEY: {{ .Values.credentials.managerGatewayKey | quote }}
  {{- end }}
