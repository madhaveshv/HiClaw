{{- $comp := dict "root" . "component" "controller" }}
{{- $tag := include "hiclaw.imageTag" (dict "tag" .Values.controller.image.tag "global" .Values.global) }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "hiclaw.controller.fullname" . }}
  namespace: {{ include "hiclaw.namespace" . }}
  labels:
    {{- include "hiclaw.component.labels" $comp | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "hiclaw.component.selectorLabels" $comp | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "hiclaw.component.selectorLabels" $comp | nindent 8 }}
    spec:
      serviceAccountName: {{ include "hiclaw.controller.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: controller
          image: "{{ .Values.controller.image.repository }}:{{ $tag }}"
          imagePullPolicy: {{ .Values.controller.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.controller.service.targetPort }}
              protocol: TCP
          envFrom:
            - secretRef:
                name: {{ include "hiclaw.secretName" . }}
          env:
            - name: HICLAW_KUBE_MODE
              value: "incluster"
            - name: HICLAW_HTTP_ADDR
              value: {{ printf ":%v" .Values.controller.service.targetPort | quote }}
            - name: HICLAW_CONTROLLER_URL
              value: {{ include "hiclaw.controller.internalURL" . | quote }}
            - name: HICLAW_WORKER_BACKEND
              value: {{ .Values.controller.workerBackend | quote }}
            - name: HICLAW_K8S_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: HICLAW_WORKER_IMAGE
              value: {{ include "hiclaw.worker.openclawImage" . | quote }}
            - name: HICLAW_COPAW_WORKER_IMAGE
              value: {{ include "hiclaw.worker.copawImage" . | quote }}
            - name: TZ
              value: {{ .Values.controller.timezone | quote }}
            {{- if eq .Values.objectStorage.type "minio" }}
            - name: HICLAW_MINIO_ENDPOINT
              value: {{ include "hiclaw.minio.internalURL" . | quote }}
            - name: HICLAW_MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "hiclaw.minio.fullname" . }}
                  key: MINIO_ROOT_USER
            - name: HICLAW_MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "hiclaw.minio.fullname" . }}
                  key: MINIO_ROOT_PASSWORD
            - name: HICLAW_MINIO_BUCKET
              value: {{ .Values.objectStorage.minio.bucketName | quote }}
            {{- end }}
            {{- if eq .Values.aiGateway.type "higress" }}
            - name: HIGRESS_BASE_URL
              value: {{ include "hiclaw.higress.consoleURL" . | quote }}
            - name: HICLAW_HIGRESS_ADMIN_USER
              value: {{ .Values.credentials.higressAdminUser | default "admin" | quote }}
            - name: HICLAW_HIGRESS_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: higress-console
                  key: adminPassword
            - name: HICLAW_AI_GATEWAY_URL
              value: {{ include "hiclaw.higress.gatewayURL" . | quote }}
            {{- end }}
            {{- /* Matrix connection (Go MatrixClient) */}}
            - name: HICLAW_MATRIX_URL
              value: {{ include "hiclaw.tuwunel.internalURL" . | quote }}
            - name: HICLAW_MATRIX_DOMAIN
              value: {{ include "hiclaw.tuwunel.serverName" . | quote }}
            {{- /* OSS storage prefix */}}
            - name: HICLAW_STORAGE_PREFIX
              value: "hiclaw/{{ .Values.objectStorage.minio.bucketName }}"
            {{- /* K8s mode runtime */}}
            - name: HICLAW_RUNTIME
              value: "k8s"
            {{- /* K8s worker resource defaults */}}
            - name: HICLAW_K8S_WORKER_CPU
              value: {{ .Values.worker.resources.requests.cpu | default "1000m" | quote }}
            - name: HICLAW_K8S_WORKER_MEMORY
              value: {{ .Values.worker.resources.requests.memory | default "2Gi" | quote }}
            {{- /* Credential persistence */}}
            - name: HICLAW_CREDS_DIR
              value: "/data/worker-creds"
            {{- range $k, $v := .Values.controller.env }}
            {{- if $v }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
            {{- end }}
          resources:
            {{- toYaml .Values.controller.resources | nindent 12 }}
          volumeMounts:
            - name: worker-creds
              mountPath: /data/worker-creds
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
      volumes:
        - name: worker-creds
          emptyDir: {}
