{{- if .Values.controller.serviceAccount.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "hiclaw.controller.fullname" . }}
  namespace: {{ include "hiclaw.namespace" . }}
  labels:
    {{- include "hiclaw.component.labels" (dict "root" . "component" "controller") | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "create", "delete", "patch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["serviceaccounts"]
    verbs: ["get", "list", "create", "delete"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  - apiGroups: ["hiclaw.io"]
    resources: ["workers", "teams", "humans"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["hiclaw.io"]
    resources: ["workers/status", "teams/status", "humans/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "hiclaw.controller.fullname" . }}
  namespace: {{ include "hiclaw.namespace" . }}
  labels:
    {{- include "hiclaw.component.labels" (dict "root" . "component" "controller") | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "hiclaw.controller.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "hiclaw.controller.serviceAccountName" . }}
    namespace: {{ include "hiclaw.namespace" . }}
---
{{- /*
  ClusterRole for worker ServiceAccounts.
  Workers authenticate to the controller via projected SA tokens (HTTP bearer),
  not directly via the K8s API. This ClusterRole exists so that per-worker
  RoleBindings created by the controller have a valid RoleRef.
*/}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: hiclaw-worker
  labels:
    {{- include "hiclaw.component.labels" (dict "root" . "component" "controller") | nindent 4 }}
rules: []
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "hiclaw.controller.fullname" . }}-tokenreview
  labels:
    {{- include "hiclaw.component.labels" (dict "root" . "component" "controller") | nindent 4 }}
rules:
  - apiGroups: ["authentication.k8s.io"]
    resources: ["tokenreviews"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "hiclaw.controller.fullname" . }}-tokenreview
  labels:
    {{- include "hiclaw.component.labels" (dict "root" . "component" "controller") | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "hiclaw.controller.fullname" . }}-tokenreview
subjects:
  - kind: ServiceAccount
    name: {{ include "hiclaw.controller.serviceAccountName" . }}
    namespace: {{ include "hiclaw.namespace" . }}
{{- end }}
