{{- if .Values.manager.enabled }}
{{- $comp := dict "root" . "component" "manager" }}
{{- $tag := include "hiclaw.imageTag" (dict "tag" .Values.manager.image.tag "global" .Values.global) }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "hiclaw.manager.fullname" . }}
  namespace: {{ include "hiclaw.namespace" . }}
  labels:
    {{- include "hiclaw.component.labels" $comp | nindent 4 }}
spec:
  replicas: {{ .Values.manager.replicaCount }}
  selector:
    matchLabels:
      {{- include "hiclaw.component.selectorLabels" $comp | nindent 6 }}
  strategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        {{- include "hiclaw.component.selectorLabels" $comp | nindent 8 }}
    spec:
      serviceAccountName: {{ include "hiclaw.manager.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if eq .Values.objectStorage.type "minio" }}
      initContainers:
        - name: init-minio-bucket
          image: "higress-registry.cn-hangzhou.cr.aliyuncs.com/higress/mc:20260216"
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              until mc alias set hiclaw {{ include "hiclaw.minio.internalURL" . }} "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD" 2>/dev/null; do
                echo "Waiting for MinIO..."; sleep 3
              done
              mc mb hiclaw/{{ .Values.objectStorage.minio.bucketName }} --ignore-existing
              for dir in shared/knowledge shared/tasks workers hiclaw-config/workers hiclaw-config/teams hiclaw-config/humans; do
                echo "" | mc pipe "hiclaw/{{ .Values.objectStorage.minio.bucketName }}/${dir}/.gitkeep" 2>/dev/null || true
              done
          envFrom:
            - secretRef:
                name: {{ include "hiclaw.minio.fullname" . }}
      {{- end }}
      containers:
        - name: manager
          image: "{{ .Values.manager.image.repository }}:{{ $tag }}"
          imagePullPolicy: {{ .Values.manager.image.pullPolicy }}
          ports:
            - name: openclaw
              containerPort: {{ .Values.manager.service.targetPort }}
              protocol: TCP
          envFrom:
            - secretRef:
                name: {{ include "hiclaw.secretName" . }}
          env:
            {{- /* Node.js heap size for OpenClaw gateway */}}
            - name: NODE_OPTIONS
              value: "--max-old-space-size=2048"
            {{- /* Core runtime mode */}}
            - name: HICLAW_RUNTIME
              value: "k8s"
            {{- /* Matrix connection */}}
            - name: HICLAW_MATRIX_URL
              value: {{ include "hiclaw.tuwunel.internalURL" . | quote }}
            - name: HICLAW_MATRIX_DOMAIN
              value: {{ include "hiclaw.tuwunel.serverName" . | quote }}
            {{- /* Controller connection (provides worker lifecycle + gateway + STS APIs) */}}
            - name: HICLAW_CONTROLLER_URL
              value: {{ include "hiclaw.controller.internalURL" . | quote }}
            {{- /* AI Gateway connection */}}
            {{- if eq .Values.aiGateway.type "higress" }}
            - name: HICLAW_AI_GATEWAY_URL
              value: {{ include "hiclaw.higress.gatewayURL" . | quote }}
            - name: HICLAW_HIGRESS_CONSOLE_URL
              value: {{ include "hiclaw.higress.consoleURL" . | quote }}
            - name: HICLAW_HIGRESS_ADMIN_USER
              value: {{ .Values.credentials.higressAdminUser | default "admin" | quote }}
            - name: HICLAW_HIGRESS_ADMIN_PASSWORD
              value: {{ .Values.credentials.higressAdminPassword | default "admin" | quote }}
            - name: HICLAW_ELEMENT_WEB_URL
              value: {{ printf "http://%s-element-web.%s.svc.cluster.local:%d" (include "hiclaw.fullname" .) (include "hiclaw.namespace" .) (.Values.elementWeb.service.port | int) | quote }}
            {{- else if .Values.aiGateway.external.gatewayUrl }}
            - name: HICLAW_AI_GATEWAY_URL
              value: {{ .Values.aiGateway.external.gatewayUrl | quote }}
            {{- end }}
            {{- /* MinIO / Object Storage */}}
            {{- if eq .Values.objectStorage.type "minio" }}
            - name: HICLAW_MINIO_ENDPOINT
              value: {{ include "hiclaw.minio.internalURL" . | quote }}
            - name: HICLAW_MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "hiclaw.minio.fullname" . }}
                  key: MINIO_ROOT_USER
            - name: HICLAW_MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "hiclaw.minio.fullname" . }}
                  key: MINIO_ROOT_PASSWORD
            - name: HICLAW_MINIO_BUCKET
              value: {{ .Values.objectStorage.minio.bucketName | quote }}
            - name: HICLAW_FS_ENDPOINT
              value: {{ include "hiclaw.minio.internalURL" . | quote }}
            {{- end }}
            {{- /* Worker runtime defaults */}}
            - name: HICLAW_DEFAULT_WORKER_RUNTIME
              value: {{ .Values.worker.defaultRuntime | quote }}
            {{- /* Pod metadata */}}
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            {{- /* User-supplied extra env */}}
            {{- range $k, $v := .Values.manager.env }}
            {{- if $v }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
            {{- end }}
          volumeMounts:
            - name: controller-token
              mountPath: /var/run/secrets/hiclaw/controller
              readOnly: true
          resources:
            {{- toYaml .Values.manager.resources | nindent 12 }}
          {{- if .Values.manager.healthCheck.enabled }}
          {{- $hcCmd := printf "nc -z 127.0.0.1 %v" .Values.manager.service.targetPort }}
          {{- if eq .Values.manager.healthCheck.type "http" }}
          {{- $hcCmd = printf "curl -sf http://127.0.0.1:%v/ >/dev/null" .Values.manager.service.targetPort }}
          {{- end }}
          readinessProbe:
            exec:
              command: ["sh", "-c", {{ $hcCmd | quote }}]
            initialDelaySeconds: 30
            periodSeconds: {{ .Values.manager.healthCheck.interval }}
            timeoutSeconds: 3
            successThreshold: {{ .Values.manager.healthCheck.healthyThreshold }}
            failureThreshold: {{ .Values.manager.healthCheck.unhealthyThreshold }}
          livenessProbe:
            exec:
              command: ["sh", "-c", {{ $hcCmd | quote }}]
            initialDelaySeconds: 90
            periodSeconds: {{ .Values.manager.healthCheck.interval }}
            timeoutSeconds: 3
            failureThreshold: {{ .Values.manager.healthCheck.unhealthyThreshold }}
          {{- end }}
      volumes:
        - name: controller-token
          projected:
            sources:
              - serviceAccountToken:
                  audience: hiclaw-controller
                  expirationSeconds: 3600
                  path: token
{{- end }}
